<title>PostFlow</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0d0d14;--bg2:#13131f;--card:#18182a;--card2:#1e1e30;
  --border:rgba(255,255,255,.07);--border2:rgba(255,255,255,.12);
  --p:#7b6ef6;--p2:#a593ff;--pink:#f06292;--teal:#4dd0c4;--amber:#ffb74d;
  --text:#eeeef5;--text2:#8888a8;--text3:#44445a;
  --r:14px;--r2:10px;--nav:60px;
  --sat:env(safe-area-inset-top,0px);--sab:env(safe-area-inset-bottom,0px);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);
  font-family:'DM Sans',sans-serif;font-size:15px;
  -webkit-tap-highlight-color:transparent;-webkit-font-smoothing:antialiased;}

/* LAYOUT */
.app{display:flex;flex-direction:column;height:100%;padding-top:var(--sat);}
.screen{display:none;flex:1;flex-direction:column;overflow:hidden;}
.screen.active{display:flex;}
.scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;overscroll-behavior:contain;}
.scroll::-webkit-scrollbar{display:none;}

/* TOP BAR */
.topbar{display:flex;align-items:center;justify-content:space-between;
  padding:14px 18px 10px;background:var(--bg);border-bottom:1px solid var(--border);flex-shrink:0;}
.tb-title{font-size:20px;font-weight:700;letter-spacing:-.3px;}
.tb-title span{color:var(--p2);}
.tb-sub{font-size:12px;color:var(--text2);margin-top:1px;}
.icon-btn{width:36px;height:36px;border-radius:10px;border:1px solid var(--border2);
  background:var(--card);color:var(--text2);display:flex;align-items:center;
  justify-content:center;cursor:pointer;transition:all .15s;flex-shrink:0;}
.icon-btn:active{background:var(--card2);transform:scale(.93);}
.icon-btn.pri{background:var(--p);border-color:var(--p);color:#fff;}

/* BOTTOM NAV */
.bottom-nav{display:flex;background:var(--bg2);border-top:1px solid var(--border);
  padding-bottom:var(--sab);height:calc(var(--nav) + var(--sab));flex-shrink:0;}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:3px;border:none;background:none;color:var(--text3);font-family:'DM Sans',sans-serif;
  font-size:10px;font-weight:500;cursor:pointer;transition:all .15s;padding:6px 2px;}
.nav-item:active{transform:scale(.9);}
.nav-item.active{color:var(--p2);}
.nav-item.active svg{filter:drop-shadow(0 0 5px var(--p));}
.ndot{width:4px;height:4px;border-radius:50%;background:var(--p);margin-top:1px;opacity:0;transition:.2s;}
.nav-item.active .ndot{opacity:1;}

/* CARDS */
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);
  margin:0 14px 10px;overflow:hidden;animation:up .2s ease both;}
@keyframes up{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* BADGE */
.badge{display:inline-flex;align-items:center;gap:5px;
  padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600;}
.dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:5px;padding:9px 16px;
  border-radius:var(--r2);border:none;font-family:'DM Sans',sans-serif;
  font-size:13px;font-weight:600;cursor:pointer;transition:all .15s;}
.btn:active{transform:scale(.96);}
.btn-pri{background:var(--p);color:#fff;}
.btn-pri:active{background:#6a5de0;}
.btn-ghost{background:var(--card2);color:var(--text2);border:1px solid var(--border2);}
.btn-ghost:active{color:var(--text);}
.btn-danger{background:rgba(240,98,146,.15);color:var(--pink);border:1px solid rgba(240,98,146,.25);}

/* SEC HEADER */
.sec-head{display:flex;align-items:center;justify-content:space-between;padding:14px 16px 8px;}
.sec-title{font-size:11px;font-weight:700;color:var(--text2);letter-spacing:.8px;text-transform:uppercase;}
.sec-link{font-size:12px;color:var(--p2);font-weight:600;cursor:pointer;background:none;border:none;font-family:'DM Sans',sans-serif;}

/* FORMS */
.fg{margin-bottom:14px;}
.fl{display:block;font-size:11px;font-weight:700;color:var(--text2);margin-bottom:6px;letter-spacing:.3px;}
.fi{width:100%;background:var(--card2);border:1px solid var(--border2);border-radius:var(--r2);
  padding:11px 14px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;
  line-height:1.6;outline:none;transition:border-color .15s;-webkit-appearance:none;}
.fi:focus{border-color:var(--p);}
textarea.fi{resize:none;min-height:90px;}
select.fi{cursor:pointer;}

/* OVERLAYS */
.ov{position:fixed;inset:0;background:rgba(0,0,0,.75);backdrop-filter:blur(8px);
  -webkit-backdrop-filter:blur(8px);z-index:200;display:flex;align-items:flex-end;
  opacity:0;pointer-events:none;transition:opacity .25s;}
.ov.open{opacity:1;pointer-events:all;}
.ov.center{align-items:center;padding:20px;}
.sheet{background:var(--bg2);border-radius:20px 20px 0 0;border-top:1px solid var(--border2);
  width:100%;max-height:92vh;display:flex;flex-direction:column;
  transform:translateY(100%);transition:transform .3s cubic-bezier(.32,.72,0,1);
  padding-bottom:var(--sab);}
.ov.open .sheet{transform:translateY(0);}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:20px;
  width:100%;max-width:440px;max-height:90vh;overflow-y:auto;padding:24px;
  transform:scale(.94) translateY(12px);transition:transform .25s cubic-bezier(.32,.72,0,1);}
.ov.open .modal{transform:scale(1) translateY(0);}
.handle{width:36px;height:4px;background:var(--border2);border-radius:2px;margin:12px auto 4px;flex-shrink:0;}
.sh-title{font-size:17px;font-weight:700;padding:8px 18px 14px;
  display:flex;align-items:center;gap:8px;flex-shrink:0;border-bottom:1px solid var(--border);}
.sh-body{overflow-y:auto;-webkit-overflow-scrolling:touch;padding:16px 18px;flex:1;
  display:flex;flex-direction:column;gap:12px;}
.sh-foot{display:flex;gap:8px;padding:12px 18px;border-top:1px solid var(--border);flex-shrink:0;}

/* TOAST */
.toast{position:fixed;bottom:calc(var(--nav) + var(--sab) + 14px);left:50%;
  transform:translateX(-50%) translateY(10px);background:var(--card2);
  border:1px solid var(--border2);color:var(--text);border-radius:10px;
  padding:10px 18px;font-size:13px;font-weight:500;z-index:400;
  opacity:0;pointer-events:none;transition:all .25s;white-space:nowrap;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* EMPTY */
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:12px;padding:60px 24px;text-align:center;}
.empty svg{opacity:.2;}
.empty-ttl{font-size:15px;font-weight:600;color:var(--text2);}
.empty-sub{font-size:12px;color:var(--text3);line-height:1.7;}

/* HOME */
.hero{margin:14px 14px 4px;background:linear-gradient(135deg,rgba(123,110,246,.12),rgba(240,98,146,.08));
  border:1px solid rgba(123,110,246,.25);border-radius:var(--r);padding:16px;
  display:flex;align-items:center;gap:12px;}
.hero-date{font-family:'DM Mono',monospace;font-size:11px;color:var(--p2);font-weight:500;letter-spacing:.5px;}
.hero-label{font-size:18px;font-weight:700;margin-top:2px;}
.hero-count{margin-left:auto;text-align:center;flex-shrink:0;}
.hero-num{font-family:'DM Mono',monospace;font-size:28px;font-weight:500;color:var(--p2);}
.hero-unit{font-size:10px;color:var(--text3);margin-top:-2px;}

.hcard{background:var(--card);border:1px solid var(--border);border-radius:var(--r);
  margin:0 14px 10px;border-left:3px solid transparent;cursor:pointer;
  transition:all .15s;overflow:hidden;}
.hcard:active{transform:scale(.98);}
.hcard-head{display:flex;align-items:center;gap:8px;padding:12px 14px 8px;}
.hcard-time{font-family:'DM Mono',monospace;font-size:11px;color:var(--text3);margin-left:auto;}
.hcard-prev{padding:0 14px 10px;font-size:13px;color:var(--text2);line-height:1.6;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.hcard-foot{display:flex;align-items:center;gap:6px;padding:8px 14px;border-top:1px solid var(--border);}
.tree-pills{display:flex;gap:4px;}
.tpill{padding:2px 7px;border-radius:6px;font-size:10px;font-weight:700;
  background:var(--card2);color:var(--text3);border:1px solid var(--border);}
.tpill.on{background:rgba(123,110,246,.2);color:var(--p2);border-color:rgba(123,110,246,.35);}
.done-badge{display:flex;align-items:center;gap:4px;font-size:11px;font-weight:700;color:var(--teal);margin-left:auto;}

/* POST DETAIL */
.tree-tab-row{display:flex;gap:5px;margin-bottom:10px;overflow-x:auto;scrollbar-width:none;}
.tree-tab-row::-webkit-scrollbar{display:none;}
.ttab{flex-shrink:0;padding:5px 11px;border-radius:7px;border:1px solid var(--border2);
  background:var(--card2);color:var(--text2);font-size:12px;font-weight:600;cursor:pointer;
  transition:all .15s;font-family:'DM Sans',sans-serif;}
.ttab.on{background:var(--p);color:#fff;border-color:var(--p);}

/* TYPE LIBRARY */
.tcard{background:var(--card);border:1px solid var(--border);border-radius:var(--r);
  margin:0 14px 10px;border-left:3px solid transparent;overflow:hidden;cursor:pointer;}
.tcard-head{display:flex;align-items:center;gap:10px;padding:13px 14px;}
.tcard-name{font-size:15px;font-weight:600;flex:1;}
.tcard-meta{font-size:11px;color:var(--text3);}
.tcard-body{padding:0 14px 12px;}
.tprev{font-size:12px;color:var(--text2);line-height:1.6;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}

/* TYPE EDITOR */
.tree-editor-box{background:var(--card2);border-radius:var(--r2);border:1px solid var(--border);padding:12px;}
.tree-slot-label{font-size:10px;font-weight:700;color:var(--p2);letter-spacing:.5px;margin-bottom:8px;font-family:'DM Mono',monospace;}
.add-ttab{padding:5px 10px;border-radius:7px;border:1px dashed var(--border2);background:none;
  color:var(--text3);font-size:12px;cursor:pointer;flex-shrink:0;font-family:'DM Sans',sans-serif;}

/* SCHEDULE */
.week-tabs{display:flex;gap:6px;padding:12px 14px;overflow-x:auto;scrollbar-width:none;flex-shrink:0;}
.week-tabs::-webkit-scrollbar{display:none;}
.wtab{flex:1;min-width:64px;padding:9px 6px;border-radius:var(--r2);
  border:1px solid var(--border);background:var(--card);text-align:center;
  cursor:pointer;transition:all .15s;position:relative;}
.wtab:active{transform:scale(.95);}
.wtab.on{border-color:var(--p);background:rgba(123,110,246,.12);}
.wtab.cur::after{content:'';position:absolute;top:6px;right:6px;
  width:6px;height:6px;border-radius:50%;background:var(--p2);}
.wt-lbl{font-size:9px;color:var(--text3);font-weight:700;letter-spacing:.5px;margin-bottom:4px;}
.wt-n{font-family:'DM Mono',monospace;font-size:18px;font-weight:500;color:var(--text2);}
.wtab.on .wt-n{color:var(--p2);}
.wt-dots{display:flex;justify-content:center;gap:2px;margin-top:4px;height:4px;}
.wt-dot{width:4px;height:4px;border-radius:50%;}

.day-row{margin:0 14px 8px;background:var(--card);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;}
.day-row-head{display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid var(--border);}
.day-lbl{font-size:13px;font-weight:700;width:28px;flex-shrink:0;}
.day-lbl.today-lbl{color:var(--p2);}
.day-slots{padding:8px 10px;display:flex;flex-direction:column;gap:6px;}
.dslot{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:8px;
  background:var(--card2);cursor:pointer;transition:all .15s;}
.dslot:active{transform:scale(.98);}
.slot-time{font-family:'DM Mono',monospace;font-size:11px;color:var(--text3);flex-shrink:0;width:42px;}
.slot-name{font-size:13px;font-weight:500;flex:1;}
.add-slot-btn{display:flex;align-items:center;justify-content:center;gap:6px;
  margin:6px 10px 10px;padding:8px;border-radius:8px;border:1px dashed var(--border2);
  color:var(--text3);font-size:12px;cursor:pointer;background:none;
  width:calc(100% - 20px);font-family:'DM Sans',sans-serif;transition:all .15s;}
.add-slot-btn:active{color:var(--p2);border-color:var(--p);}

/* IMAGES */
.img-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:3px;padding:0 14px 14px;}
.img-cell{aspect-ratio:1;border-radius:8px;overflow:hidden;background:var(--card);
  border:1px solid var(--border);position:relative;cursor:pointer;transition:all .15s;}
.img-cell:active{transform:scale(.96);}
.img-cell img{width:100%;height:100%;object-fit:cover;}
.img-lbl{position:absolute;bottom:0;left:0;right:0;
  background:linear-gradient(transparent,rgba(0,0,0,.7));
  padding:16px 5px 5px;font-size:9px;color:rgba(255,255,255,.8);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.img-add-cell{display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:5px;color:var(--text3);font-size:10px;cursor:pointer;
  border:1px dashed var(--border2);border-radius:8px;aspect-ratio:1;transition:all .15s;}
.img-add-cell:active{color:var(--p2);border-color:var(--p);}

/* COLOR SWATCHES */
.color-row{display:flex;gap:8px;flex-wrap:wrap;}
.sw{width:30px;height:30px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:all .15s;}
.sw:active{transform:scale(1.1);}
.sw.on{border-color:#fff;}

/* CHECKBOX */
.cb{
  width:22px;height:22px;border-radius:6px;flex-shrink:0;
  border:2px solid var(--border2);background:transparent;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:all .2s;
}
.cb.checked{background:var(--teal);border-color:var(--teal);}
.cb svg{opacity:0;transform:scale(.6);transition:all .2s;}
.cb.checked svg{opacity:1;transform:scale(1);}
.cb-label{font-size:12px;color:var(--text3);transition:color .2s;}
.cb.checked + .cb-label{color:var(--teal);font-weight:600;}
</style>
</head>

<div class="ov" id="ov-post">

<div class="ov center" id="ov-cycle">

        保存
      </button>
      <button class="btn btn-pri" style="flex:1;" onclick="copyImgName()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
        コピー
      </button>

  </div>

<script>
// ════════════════════════════════════════
// STATE
// ════════════════════════════════════════
const KEY='postflow_v2';
let S={
  types:[],
  schedule:{1:{},2:{},3:{},4:{}},
  images:[],
  cycleStart:today(),
  selWeek:1,
  done:{},
};
function today(){return new Date().toISOString().slice(0,10);}
function load(){try{const s=localStorage.getItem(KEY);if(s)S={...S,...JSON.parse(s)};}catch(e){}}
function save(){localStorage.setItem(KEY,JSON.stringify(S));}

const DOW=['mon','tue','wed','thu','fri','sat','sun'];
const DOWJP={mon:'月',tue:'火',wed:'水',thu:'木',fri:'金',sat:'土',sun:'日'};
const COLORS=['#7b6ef6','#f06292','#4dd0c4','#ffb74d','#64b5f6','#a5d6a7','#ce93d8','#ff8a65'];

function getWeekNum(){
  const s=new Date(S.cycleStart+'T00:00:00');
  const t=new Date(today()+'T00:00:00');
  const d=Math.max(0,Math.floor((t-s)/86400000));
  return (Math.floor(d/7)%4)+1;
}
function getTodayDow(){return['sun','mon','tue','wed','thu','fri','sat'][new Date().getDay()];}

// ════════════════════════════════════════
// NAV
// ════════════════════════════════════════
function showTab(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  const map={
    'sc-home':'nav-home','sc-types':'nav-types',
    'sc-schedule':'nav-schedule','sc-images':'nav-images'
  };
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  document.getElementById(map[id])?.classList.add('active');
  const renders={'sc-home':renderHome,'sc-types':renderTypes,'sc-schedule':renderSchedule,'sc-images':renderImages};
  renders[id]?.();
}

// ════════════════════════════════════════
// OVERLAYS
// ════════════════════════════════════════
function openOv(id){document.getElementById(id).classList.add('open');}
function closeOv(id){document.getElementById(id).classList.remove('open');}
document.querySelectorAll('.ov').forEach(el=>{
  el.addEventListener('click',e=>{if(e.target===el)el.classList.remove('open');});
});

// ════════════════════════════════════════
// TOAST
// ════════════════════════════════════════
let _tt;
function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  clearTimeout(_tt);_tt=setTimeout(()=>t.classList.remove('show'),2400);
}

// ════════════════════════════════════════
// HOME
// ════════════════════════════════════════
function renderHome(){
  const wn=getWeekNum(),dk=getTodayDow(),td=today();
  const slots=(S.schedule[wn]?.[dk])||[];
  const d=new Date(td+'T00:00:00');
  const DN=['日','月','火','水','木','金','土'];
  const done=slots.filter((_,i)=>S.done[`${td}-${wn}-${dk}-${i}`]).length;
  document.getElementById('home-sub').textContent=`WEEK${wn} · ${DOWJP[dk]}曜日 · ${slots.length}件`;
  document.getElementById('home-hero').innerHTML=`
    <div class="hero">
      <div>
        <div class="hero-date">WEEK ${wn} · ${DN[d.getDay()]}曜日</div>
        <div class="hero-label">${d.getMonth()+1}月${d.getDate()}日</div>
      </div>
      <div class="hero-count">
        <div class="hero-num">${done}/${slots.length}</div>
        <div class="hero-unit">投稿完了</div>
      </div>
    </div>`;
  const list=document.getElementById('home-list');
  if(!slots.length){
    list.innerHTML=`<div class="empty">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      <div class="empty-ttl">今日の投稿がありません</div>
      <div class="empty-sub">スケジュールタブから型を設定しましょう</div>
    </div>`;
    return;
  }
  list.innerHTML=slots.map((sl,i)=>{
    const type=S.types.find(t=>t.id===sl.typeId);
    if(!type)return'';
    const pk=`${td}-${wn}-${dk}-${i}`;
    const isDone=S.done[pk];
    const n=type.slots?.length||1;
    const pills=Array.from({length:n},(_,ti)=>`<div class="tpill${ti===0?' on':''}">${ti+1}/${n}</div>`).join('');
    const prev=type.slots?.[0]?.text||'';
    return `<div class="hcard" style="border-left-color:${type.color};${isDone?'opacity:.5':''}"
      onclick="openPostOv('${sl.typeId}','${pk}')">
      <div class="hcard-head">
        <div class="badge" style="background:${type.color}22;color:${type.color};">
          <div class="dot" style="background:${type.color};"></div>${esc(type.name)}
        </div>
        <div class="hcard-time">${sl.time||'--:--'}</div>
      </div>
      <div class="hcard-prev">${esc(prev)}</div>
      <div class="hcard-foot">
        <div class="tree-pills">${pills}</div>
        <div style="display:flex;align-items:center;gap:6px;margin-left:auto;">
        <div class="cb ${isDone?'checked':''}" onclick="event.stopPropagation();quickToggleDone('${pk}')">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg>
        </div>
        <span class="cb-label ${isDone?'checked':''}">${isDone?'投稿済み':'未投稿'}</span>
      </div>
    </div>`;
  }).join('');
}
function resetTodayDone(){
  const td=today(),wn=getWeekNum(),dk=getTodayDow();
  const pfx=`${td}-${wn}-${dk}-`;
  Object.keys(S.done).forEach(k=>{if(k.startsWith(pfx))delete S.done[k];});
  save();renderHome();toast('今日の完了をリセットしました');
}

// 投稿詳細
let _curTypeId='',_curPk='',_curTree=0;
function openPostOv(typeId,pk){
  _curTypeId=typeId;_curPk=pk;_curTree=0;
  renderPostOv();openOv('ov-post');
}
function renderPostOv(){
  const type=S.types.find(t=>t.id===_curTypeId);if(!type)return;
  const slots=type.slots||[{text:'',note:''}];
  const isDone=S.done[_curPk];
  document.getElementById('post-ov-title').textContent=type.name;
  const tabs=slots.map((s,i)=>`<div class="ttab ${i===_curTree?'on':''}" onclick="switchPostTree(${i})">${i+1}/${slots.length}</div>`).join('');
  const cur=slots[_curTree]||{};
  document.getElementById('post-ov-body').innerHTML=`
    <div style="display:flex;gap:6px;align-items:center;">
      <div class="tree-tab-row" style="flex:1;margin:0;">${tabs}</div>
      <div onclick="toggleDone()" style="display:flex;align-items:center;gap:6px;cursor:pointer;flex-shrink:0;">
        <div class="cb ${isDone?'checked':''}" style="pointer-events:none;">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg>
        </div>
        <span style="font-size:12px;font-weight:600;color:${isDone?'var(--teal)':'var(--text3)'};">${isDone?'投稿済み':'完了にする'}</span>
      </div>
    </div>
    <div style="background:var(--card2);border-radius:12px;padding:14px;">
      <textarea id="post-ta" class="fi" style="background:transparent;border:none;padding:0;min-height:160px;font-size:14px;"
        oninput="savePostText(this.value)">${esc(cur.text||'')}</textarea>
    </div>
    ${cur.note?`<div style="background:rgba(123,110,246,.08);border:1px solid rgba(123,110,246,.2);border-radius:10px;padding:10px 12px;font-size:12px;color:var(--text2);">📎 ${esc(cur.note)}</div>`:''}
  `;
}
function switchPostTree(i){
  const ta=document.getElementById('post-ta');
  const type=S.types.find(t=>t.id===_curTypeId);
  if(ta&&type?.slots?.[_curTree]) type.slots[_curTree].text=ta.value;
  _curTree=i;renderPostOv();
}
function savePostText(v){
  const type=S.types.find(t=>t.id===_curTypeId);
  if(type?.slots?.[_curTree]) type.slots[_curTree].text=v;
  save();
}
function toggleDone(){
  S.done[_curPk]=!S.done[_curPk];save();renderPostOv();renderHome();
}
function quickToggleDone(pk){
  S.done[pk]=!S.done[pk];save();renderHome();
}
function copyPost(){
  const ta=document.getElementById('post-ta');
  const txt=ta?.value||'';
  if(navigator.clipboard){navigator.clipboard.writeText(txt).then(()=>toast('📋 コピーしました'));}
  else{const t=document.createElement('textarea');t.value=txt;document.body.appendChild(t);t.select();document.execCommand('copy');document.body.removeChild(t);toast('📋 コピーしました');}
  closeOv('ov-post');
}

// ════════════════════════════════════════
// TYPES
// ════════════════════════════════════════
let _editTid=null,_tslots=[],_tcolor=COLORS[0],_activeT=0;
function renderTypes(){
  document.getElementById('type-sub').textContent=`${S.types.length}件の型`;
  const list=document.getElementById('type-list');
  if(!S.types.length){
    list.innerHTML=`<div class="empty">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
      <div class="empty-ttl">型がまだありません</div>
      <div class="empty-sub">右上の＋から追加しましょう</div>
    </div>`;
    return;
  }
  list.innerHTML=S.types.map(t=>{
    const n=t.slots?.length||1;
    const prev=t.slots?.[0]?.text||'';
    return `<div class="tcard" style="border-left-color:${t.color};" onclick="openTypeDetail('${t.id}')">
      <div class="tcard-head">
        <div class="dot" style="background:${t.color};width:10px;height:10px;"></div>
        <div class="tcard-name">${esc(t.name)}</div>
        <div class="tcard-meta">${n>1?`${n}ツリー`:'単体'}</div>
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--text3)" stroke-width="2" stroke-linecap="round"><polyline points="9 18 15 12 9 6"/></svg>
      </div>
      ${prev?`<div class="tcard-body"><div class="tprev">${esc(prev)}</div></div>`:''}
    </div>`;
  }).join('');
}

let _detailTid='';
function openTypeDetail(id){
  _detailTid=id;
  const t=S.types.find(tt=>tt.id===id);if(!t)return;
  document.getElementById('td-title').textContent=t.name;
  const slots=t.slots||[{text:'',note:''}];
  document.getElementById('td-body').innerHTML=`
    ${t.memo?`<div style="background:rgba(123,110,246,.08);border:1px solid rgba(123,110,246,.2);border-radius:10px;padding:10px 12px;font-size:12px;color:var(--text2);">📎 ${esc(t.memo)}</div>`:''}
    ${slots.map((s,i)=>`
      <div style="background:var(--card2);border-radius:12px;border:1px solid var(--border);overflow:hidden;">
        <div style="padding:7px 12px;border-bottom:1px solid var(--border);font-size:10px;font-weight:700;color:var(--p2);font-family:'DM Mono',monospace;">${i+1}/${slots.length}</div>
        <div style="padding:12px;font-size:13px;line-height:1.8;white-space:pre-wrap;color:var(--text);">${esc(s.text)||'<span style="color:var(--text3);">テキストなし</span>'}</div>
        ${s.note?`<div style="padding:6px 12px 10px;font-size:11px;color:var(--text3);">📎 ${esc(s.note)}</div>`:''}
      </div>
    `).join('')}`;
  openOv('ov-tdetail');
}
function editTypeFromDetail(){closeOv('ov-tdetail');setTimeout(()=>openEditType(_detailTid),200);}
function deleteType(){
  if(!confirm('この型を削除しますか？'))return;
  S.types=S.types.filter(t=>t.id!==_detailTid);
  save();closeOv('ov-tdetail');renderTypes();toast('🗑 型を削除しました');
}

function openAddTypeSheet(){
  _editTid=null;_tslots=[{text:'',note:''}];_activeT=0;
  _tcolor=COLORS[S.types.length%COLORS.length];
  document.getElementById('type-ov-title').textContent='型を追加';
  document.getElementById('t-name').value='';
  document.getElementById('t-memo').value='';
  renderColorPicker();renderTreeEditor();openOv('ov-type');
}
function openEditType(id){
  const t=S.types.find(tt=>tt.id===id);if(!t)return;
  _editTid=id;_tcolor=t.color;_activeT=0;
  _tslots=JSON.parse(JSON.stringify(t.slots||[{text:'',note:''}]));
  document.getElementById('type-ov-title').textContent='型を編集';
  document.getElementById('t-name').value=t.name;
  document.getElementById('t-memo').value=t.memo||'';
  renderColorPicker();renderTreeEditor();openOv('ov-type');
}

function saveCurTree(){
  const ta=document.getElementById('t-text');
  const no=document.getElementById('t-note');
  if(ta&&_tslots[_activeT]) _tslots[_activeT].text=ta.value;
  if(no&&_tslots[_activeT]) _tslots[_activeT].note=no.value;
}
function addTree(){saveCurTree();_tslots.push({text:'',note:''});_activeT=_tslots.length-1;renderTreeEditor();}
function removeTree(i){
  if(_tslots.length<=1){toast('最低1つ必要です');return;}
  _tslots.splice(i,1);_activeT=Math.min(_activeT,_tslots.length-1);renderTreeEditor();
}
function switchTree(i){saveCurTree();_activeT=i;renderTreeEditor();}

function renderTreeEditor(){
  const n=_tslots.length;
  document.getElementById('t-tabs').innerHTML=
    _tslots.map((s,i)=>`<div class="ttab ${i===_activeT?'on':''}" onclick="switchTree(${i})">${i+1}/${n}</div>`).join('')
    +`<button class="add-ttab" onclick="addTree()">＋ 追加</button>`;
  const cur=_tslots[_activeT]||{};
  document.getElementById('t-editor').innerHTML=`
    <div class="tree-editor-box">
      <div class="tree-slot-label">${_activeT+1}/${n} · 投稿テキスト</div>
      <textarea id="t-text" class="fi" style="background:transparent;border:none;padding:0;min-height:100px;"
        placeholder="投稿文を入力…">${esc(cur.text||'')}</textarea>
      <div style="height:1px;background:var(--border);margin:10px 0;"></div>
      <div class="fl">備考・ポイント</div>
      <input id="t-note" class="fi" style="background:transparent;border:none;padding:0;" placeholder="例：数字を入れる、CTA必須…" value="${esc(cur.note||'')}">
    </div>
    ${n>1?`<button onclick="removeTree(${_activeT})" style="background:none;border:none;color:var(--pink);font-size:12px;cursor:pointer;padding:6px 0;font-family:'DM Sans',sans-serif;">✕ このスロットを削除</button>`:''}`;
}

function renderColorPicker(){
  document.getElementById('t-colors').innerHTML=COLORS.map(c=>
    `<div class="sw ${c===_tcolor?'on':''}" style="background:${c};" onclick="pickColor('${c}',this)"></div>`
  ).join('');
}
function pickColor(c,el){
  _tcolor=c;
  document.querySelectorAll('#t-colors .sw').forEach(s=>s.classList.remove('on'));
  el.classList.add('on');
}
function saveType(){
  saveCurTree();
  const name=document.getElementById('t-name').value.trim();
  if(!name){toast('名前を入力してください');return;}
  const memo=document.getElementById('t-memo').value.trim();
  if(_editTid){
    const t=S.types.find(tt=>tt.id===_editTid);
    if(t){t.name=name;t.color=_tcolor;t.memo=memo;t.slots=_tslots;}
  } else {
    S.types.push({id:'t'+Date.now(),name,color:_tcolor,memo,slots:_tslots});
  }
  save();closeOv('ov-type');renderTypes();toast('✅ 型を保存しました');
}

// ════════════════════════════════════════
// SCHEDULE
// ════════════════════════════════════════
function renderSchedule(){
  const wn=S.selWeek,curWn=getWeekNum();
  document.getElementById('sch-sub').textContent=`WEEK${wn}${wn===curWn?' · 今週':''}`;
  // week tabs
  document.getElementById('week-tabs').innerHTML=[1,2,3,4].map(w=>{
    const wd=S.schedule[w]||{};
    const dots=DOW.flatMap(dk=>(wd[dk]||[]).map(sl=>{
      const t=S.types.find(tt=>tt.id===sl.typeId);
      return t?`<div class="wt-dot" style="background:${t.color};"></div>`:'';
    })).slice(0,5).join('');
    return `<div class="wtab ${w===wn?'on':''} ${w===curWn?'cur':''}" onclick="selWeek(${w})">
      <div class="wt-lbl">WEEK</div>
      <div class="wt-n">${w}</div>
      <div class="wt-dots">${dots}</div>
    </div>`;
  }).join('');
  // days
  const wd=S.schedule[wn]||{};
  const todayDk=getTodayDow();
  document.getElementById('sch-body').innerHTML=DOW.map(dk=>{
    const slots=wd[dk]||[];
    const isToday=dk===todayDk&&wn===curWn;
    return `<div class="day-row">
      <div class="day-row-head">
        <div class="day-lbl ${isToday?'today-lbl':''}">${DOWJP[dk]}${isToday?' 🔵':''}</div>
        <div style="font-size:12px;color:var(--text3);">${slots.length}件</div>
      </div>
      ${slots.length?`<div class="day-slots">${slots.map((sl,i)=>{
        const t=S.types.find(tt=>tt.id===sl.typeId);if(!t)return'';
        const n=t.slots?.length||1;
        return `<div class="dslot" onclick="openSlotEdit(${wn},'${dk}',${i})">
          <div style="width:7px;height:7px;border-radius:50%;background:${t.color};flex-shrink:0;"></div>
          <div class="slot-time">${sl.time||'--:--'}</div>
          <div class="slot-name">${esc(t.name)}</div>
          <div style="font-size:10px;color:var(--text3);flex-shrink:0;">${n>1?n+'ツリー':''}</div>
          <button onclick="event.stopPropagation();rmSlot(${wn},'${dk}',${i})"
            style="background:none;border:none;color:var(--text3);cursor:pointer;padding:4px;flex-shrink:0;">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          </button>
        </div>`;
      }).join('')}</div>`:''}
      <button class="add-slot-btn" onclick="openSlotAdd(${wn},'${dk}')">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        型を追加
      </button>
    </div>`;
  }).join('');
}
function selWeek(w){S.selWeek=w;save();renderSchedule();}

let _sw=1,_sdk='mon',_si=-1;
function openSlotAdd(wn,dk){
  if(!S.types.length){toast('先に「型」タブで型を登録してください');return;}
  _sw=wn;_sdk=dk;_si=-1;
  document.getElementById('slot-ov-title').textContent=`${DOWJP[dk]}曜日に追加`;
  document.getElementById('slot-type').innerHTML=S.types.map(t=>`<option value="${t.id}">${t.name}</option>`).join('');
  document.getElementById('slot-time').value='';
  openOv('ov-slot');
}
function openSlotEdit(wn,dk,i){
  _sw=wn;_sdk=dk;_si=i;
  const sl=(S.schedule[wn]?.[dk]||[])[i];if(!sl)return;
  document.getElementById('slot-ov-title').textContent=`${DOWJP[dk]}曜日を編集`;
  document.getElementById('slot-type').innerHTML=S.types.map(t=>`<option value="${t.id}" ${t.id===sl.typeId?'selected':''}>${t.name}</option>`).join('');
  document.getElementById('slot-time').value=sl.time||'';
  openOv('ov-slot');
}
function saveSlot(){
  const typeId=document.getElementById('slot-type').value;
  const time=document.getElementById('slot-time').value;
  if(!typeId||!S.types.find(t=>t.id===typeId)){toast('型を選択してください');return;}
  if(!S.schedule[_sw]) S.schedule[_sw]={};
  if(!S.schedule[_sw][_sdk]) S.schedule[_sw][_sdk]=[];
  if(_si>=0) S.schedule[_sw][_sdk][_si]={typeId,time};
  else S.schedule[_sw][_sdk].push({typeId,time});
  save();closeOv('ov-slot');renderSchedule();toast('✅ 保存しました');
}
function rmSlot(wn,dk,i){
  S.schedule[wn][dk].splice(i,1);
  save();renderSchedule();toast('削除しました');
}

function openCycleModal(){document.getElementById('cycle-date').value=S.cycleStart;openOv('ov-cycle');}
function saveCycle(){
  const v=document.getElementById('cycle-date').value;
  if(!v){toast('日付を選んでください');return;}
  S.cycleStart=v;S.selWeek=1;save();
  closeOv('ov-cycle');renderSchedule();toast('🔄 ローテーション開始日を設定しました');
}

function renderImages(){
  document.getElementById('img-sub').textContent=`${S.images.length}枚`;
  document.getElementById('img-wrap').innerHTML=`<div class="img-grid">
    ${S.images.map((img,i)=>`
      <div class="img-cell" onclick="openImgOv(${i})">
        <img src="${img.dataUrl}" loading="lazy">
        <div class="img-lbl">${esc(img.name)}</div>
      </div>`).join('')}
    <div class="img-add-cell" onclick="triggerUpload()">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><polyline points="16 16 12 12 8 16"/><line x1="12" y1="12" x2="12" y2="21"/><path d="M20.39 18.39A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.3"/></svg>
      追加
    </div>
  </div>`;
}
function triggerUpload(){document.getElementById('img-input').click();}
function handleUpload(e){
  const files=[...e.target.files];let done=0;
  files.forEach(f=>{
    const r=new FileReader();
    r.onload=ev=>{
      S.images.push({id:'i'+Date.now()+Math.random(),name:f.name,dataUrl:ev.target.result,at:new Date().toISOString()});
      if(++done===files.length){save();renderImages();toast(`✅ ${done}枚追加しました`);}
    };
    r.readAsDataURL(f);
  });
  e.target.value='';
}
let _curImg=-1;
function openImgOv(i){
  _curImg=i;const img=S.images[i];
  document.getElementById('img-ov-title').textContent=img.name;
  document.getElementById('img-ov-preview').src=img.dataUrl;
  document.getElementById('img-ov-info').textContent=`${new Date(img.at).toLocaleDateString('ja-JP')}`;
  openOv('ov-img');
}
function deleteImg(){
  if(!confirm('削除しますか？'))return;
  S.images.splice(_curImg,1);save();closeOv('ov-img');renderImages();toast('🗑 削除しました');
}
function downloadImg(){
  const img=S.images[_curImg];if(!img)return;
  const a=document.createElement('a');
  a.href=img.dataUrl;
  a.download=img.name;
  document.body.appendChild(a);a.click();document.body.removeChild(a);
  toast('⬇️ ダウンロードしました');
}
function copyImgName(){
  const n=S.images[_curImg]?.name||'';
  if(navigator.clipboard) navigator.clipboard.writeText(n).then(()=>toast('📋 コピーしました'));
  else toast('📋 '+n);
  closeOv('ov-img');
}

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

  const base=location.origin+location.pathname.replace(/\/[^/]*$/,'/');
  navigator.serviceWorker.register(base+'sw.js',{scope:base}).catch(()=>{});

// SPLASH
(function(){
  function go(){
    const logo=document.getElementById('spl-logo');
    const name=document.getElementById('spl-name');
    const sub=document.getElementById('spl-sub');
    const glow=document.getElementById('spl-glow');
    const sp=document.getElementById('splash');
    // フェーズ1: グロー展開
    requestAnimationFrame(()=>{
      glow.style.opacity='1';
      glow.style.transform='scale(1)';
    });
    // フェーズ2: ロゴ浮き出し（少し遅延）
    setTimeout(()=>{
      logo.style.opacity='1';
      logo.style.transform='scale(1) translateY(0)';
      logo.style.boxShadow='0 8px 40px rgba(123,110,246,.4)';
    },120);
    // フェーズ3: テキスト
    setTimeout(()=>{
      name.style.opacity='1';name.style.transform='translateY(0)';
      sub.style.opacity='1';
    },280);
    // フェードアウト
    setTimeout(()=>{
      sp.style.transition='opacity .45s ease';
      sp.style.opacity='0';
      setTimeout(()=>{sp.style.display='none';renderHome();},450);
    },1800);
  }
  if(document.fonts?.ready) document.fonts.ready.then(go);
  else window.addEventListener('load',go);
})();
